service: service_name

image: image_name

builder:
  arch: amd64

proxy:
  host: your_host_name.com
  app_port: 3000
  ssl: true

servers:
  web:
    hosts:
      - YOUR_SERVER_IP
    cmd: bundle exec puma

  jobs:
    hosts:
      - YOUR_SERVER_IP
    cmd: bundle exec sidekiq -r ./config/environment.rb

volumes:
  - "/db:/twitch_telegram_bot/storage/db"

# logging:
#   driver: journald

registry:
  server: registry.digitalocean.com/your_name
  username:
    - KAMAL_REGISTRY_USER
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    PORT: 3000
    MAX_CHAT_SUBSCRIPTIONS: 15
    MAX_CHATS: 500
  secret:
    - TWITCH_MESSAGE_SECRET
    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TELEGRAM_TOKEN
    - TELEGRAM_SECRET_TOKEN
    - DB_ENCRYPTION_PRIMARY_KEY
    - DB_ENCRYPTION_DETERMINISTIC_KEY
    - DB_ENCRYPTION_KEY_DERIVATION_SALT
    - PUBLIC_API_URL
    - REDIS_URL
    - SENTRY_DSN

retain_containers: 1

accessories:
  redis:
    image: redis:latest
    roles:
      - web
      - jobs
    cmd: "/bin/sh -c 'redis-server --requirepass $REDIS_PASSWORD'"
    env:
      secret:
        - REDIS_PASSWORD
    volumes:
      - /var/lib/redis:/data
